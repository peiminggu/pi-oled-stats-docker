services:
  oled-status:
    build: .
    container_name: oled-status
    restart: unless-stopped
    network_mode: host
    devices:
      - /dev/i2c-1:/dev/i2c-1
    environment:
      DISPLAY_WIDTH: "128"
      DISPLAY_HEIGHT: "64"
      I2C_PORT: "1"
      I2C_ADDRESS: "0x3C"
      REFRESH_SECONDS: "2"
      DISK_PATH: "/nas"
      FALLBACK_DISK_PATH: "/"
      LOG_LEVEL: "INFO"
    volumes:
      - /:/host:ro
      - /nas:/nas:ro
